<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام إدارة نادي المحارب الرياضي - النسخة الشاملة</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #005B71; --gold: #D4AF37; --white: #ffffff; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); padding-top: 160px; }
        .admin-nav { position: fixed; top: 0; left: 0; right: 0; background: var(--primary); z-index: 2000; border-bottom: 4px solid var(--gold); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .nav-top { display: flex; align-items: center; justify-content: center; padding: 12px; color: white; font-weight: bold; }
        .nav-top img { width: 40px; border-radius: 50%; border: 2px solid var(--gold); margin-left: 12px; }
        .tabs { display: flex; background: white; overflow-x: auto; padding: 10px; gap: 8px; justify-content: center; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 8px; background: #eee; cursor: pointer; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .container { max-width: 1100px; margin: auto; padding: 15px; }
        .page-section { display: none; animation: fadeIn 0.4s; }
        .page-section.active { display: block; }
        .monitor-frame { background: #000; border-radius: 15px; position: relative; overflow: hidden; aspect-ratio: 16/9; border: 4px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .main-stream { width: 100%; height: 100%; object-fit: cover; }
        .fifa-sb-mini { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; z-index: 500; min-width: 150px; }
        .sb-main-row { display: flex; align-items: center; background: rgba(0,0,0,0.85); height: 38px; border-radius: 4px 4px 0 0; border-right: 4px solid var(--gold); overflow: hidden; }
        .sb-logo-box { padding: 0 10px; display: flex; align-items: center; }
        .sb-logo-box img { width: 25px; height: 25px; object-fit: contain; }
        .sb-score { background: var(--gold); color: black; padding: 0 15px; font-size: 1.2rem; font-weight: 900; height: 100%; display: flex; align-items: center; position: relative; min-width: 55px; justify-content: center; }
        .sb-time-row { background: rgba(255, 255, 255, 0.95); color: #111; font-size: 0.85rem; font-weight: 900; text-align: center; padding: 4px 0; border-radius: 0 0 4px 4px; }
        .gol-label { position: absolute; inset: 0; background: #111; color: var(--gold); display: none; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 900; letter-spacing: 1px; }
        .overlay-msg { position: absolute; bottom: 20px; left: 20px; background: rgba(255,255,255,0.95); color: #111; padding: 12px 18px; border-radius: 6px; display: none; align-items: center; gap: 12px; border-right: 5px solid var(--gold); z-index: 600; font-weight: bold; box-shadow: 0 5px 20px rgba(0,0,0,0.4); animation: slideInLeft 0.5s ease; }
        .overlay-msg img { width: 32px; height: 32px; }
        .staff-cams { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .cam-box { background: #222; aspect-ratio: 16/9; border-radius: 8px; border: 2px solid #444; position: relative; overflow: hidden; }
        .cam-box video { width: 100%; height: 100%; object-fit: cover; }
        .cam-box span { position: absolute; bottom: 5px; right: 8px; color: white; font-size: 0.7rem; background: rgba(0,0,0,0.6); padding: 2px 6px; border-radius: 4px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: var(--primary); }
        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .btn { padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.85rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-gold { background: var(--gold); color: black; }
        input { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        @keyframes slideInLeft { from { transform: translateX(-110%); } to { transform: translateX(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<nav class="admin-nav">
    <div class="nav-top"><img src="8397.jpg"> نادي المحارب الرياضي - غُرفة العمليات</div>
    <div class="tabs">
        <button class="tab-btn active" onclick="showTab('live', this)">🎥 المخرج</button>
        <button class="tab-btn" onclick="showTab('staff', this)">👷 الموظفين</button>
        <button class="tab-btn" onclick="showTab('store', this)">🛒 المتجر</button>
        <button class="tab-btn" onclick="showTab('matches', this)">🏟️ المباريات</button>
    </div>
</nav>

<div class="container">
    <div id="live" class="page-section active">
        <div class="monitor-frame">
            <div class="fifa-sb-mini">
                <div class="sb-main-row">
                    <div class="sb-logo-box"><img src="8397.jpg"></div>
                    <div class="sb-score"><span id="sh">0</span> - <span id="sa">0</span><div id="gol-text" class="gol-label">GOAL</div></div>
                    <div class="sb-logo-box"><img id="opp-logo-view" src="8397.jpg"></div>
                </div>
                <div class="sb-time-row"><span id="timer-display">00:00</span><span id="extra-display" style="color:red; margin-right:4px;"></span></div>
            </div>
            <div id="action-overlay" class="overlay-msg"><img src="8397.jpg"><span id="action-text"></span></div>
            <video id="main-v" class="main-stream" autoplay playsinline></video>
        </div>

        <div class="staff-cams">
            <div class="cam-box"><video id="c1" autoplay muted></video><span>كاميرا 1 (رئيسية)</span></div>
            <div class="cam-box"><video id="c2" autoplay playsinline></video><span>كاميرا 2 (المصور)</span></div>
            <div class="cam-box"><div style="color:#666; padding:20px; text-align:center;">كاميرا 3 (غير متصلة)</div><span>موظف 3</span></div>
        </div>

        <div class="card">
            <div style="display:flex; gap:10px; background:#eee; padding:10px; border-radius:8px; margin-bottom:10px;">
                <input type="text" id="staff-cam-id" placeholder="اسم المصور (cam1)" style="margin:0;">
                <button class="btn btn-primary" onclick="connectToStaff()">ربط المصور</button>
                <button class="btn btn-gold" onclick="switchMainView('director')">عرضي أساسي</button>
                <button class="btn btn-gold" onclick="switchMainView('staff')">المصور أساسي</button>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <input type="text" id="opp-name" placeholder="اسم الفريق الخصم">
                <input type="file" accept="image/*" onchange="loadOppLogo(this)" style="font-size: 0.7rem; padding:8px;">
            </div>
            <div class="control-grid">
                <button class="btn btn-gold" onclick="startClock()">▶️ بدء الوقت</button>
                <button class="btn btn-gold" onclick="stopClock()">⏸️ إيقاف</button>
                <input type="number" id="extra-in" placeholder="+ دقائق إضافية" style="margin:0;">
            </div>
            <div class="control-grid">
                <button class="btn btn-primary" onclick="scoreGoal('h')">⚽ هدف المحارب</button>
                <button class="btn btn-primary" onclick="scoreGoal('a')">⚽ هدف الخصم</button>
                <button class="btn btn-primary" onclick="applyExtra()">➕ تثبيت الإضافي</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-top:10px;">
                <div style="border:1px solid #ddd; padding:10px; border-radius:8px;">
                    <h4 style="margin:0 0 10px 0;">🔄 التبديلات</h4>
                    <input type="text" id="p-out" placeholder="اسم الخارج">
                    <input type="text" id="p-in" placeholder="اسم الداخل">
                    <button class="btn btn-gold" style="width:100%" onclick="doSub()">إظهار التبديل</button>
                </div>
                <div style="border:1px solid #ddd; padding:10px; border-radius:8px;">
                    <h4 style="margin:0 0 10px 0;">🟨 البطاقات</h4>
                    <input type="text" id="p-card" placeholder="اسم اللاعب">
                    <div style="display:flex; gap:5px;"><button class="btn" style="background:yellow; flex:1" onclick="doCard('🟨 بطاقة صفراء')">🟨</button><button class="btn" style="background:red; color:white; flex:1" onclick="doCard('🟥 بطاقة حمراء')">🟥</button></div>
                </div>
            </div>
        </div>
    </div>

    <div id="staff" class="page-section"><div class="card"><h3>👷 إضافة موظف جديد</h3><input type="text" id="st-name" placeholder="اسم الموظف الكامل"><input type="text" id="st-job" placeholder="الوظيفة"><button class="btn btn-primary" onclick="saveToDB('staff', {name: document.getElementById('st-name').value, job: document.getElementById('st-job').value})">حفظ الموظف</button><table id="staff-table"><thead><tr><th>الاسم</th><th>الوظيفة</th><th>الحالة</th></tr></thead><tbody></tbody></table></div></div>
    <div id="store" class="page-section"><div class="card"><h3>🛒 إدارة المتجر</h3><input type="text" id="pr-name" placeholder="اسم المنتج"><input type="number" id="pr-price" placeholder="السعر"><button class="btn btn-primary" onclick="saveToDB('products', {name: document.getElementById('pr-name').value, price: document.getElementById('pr-price').value})">إضافة منتج</button><table id="store-table"><thead><tr><th>المنتج</th><th>السعر</th></tr></thead><tbody></tbody></table></div></div>
    <div id="matches" class="page-section"><div class="card"><h3>🏟️ سجل المباريات</h3><input type="text" id="m-opp" placeholder="الخصم"><input type="date" id="m-date"><button class="btn btn-primary" onclick="saveToDB('matches', {opp: document.getElementById('m-opp').value, date: document.getElementById('m-date').value})">إضافة مباراة</button><table id="matches-table"><thead><tr><th>الخصم</th><th>التاريخ</th></tr></thead><tbody></tbody></table></div></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyCCK45eRuoY6VqA5lrA7z89pZ3_mU", databaseURL: "https://warrior-club-2aac0-default-rtdb.firebaseio.com/", projectId: "warrior-club-2aac0" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // إعداد الربط العالمي (warrior-live) ليكون هو المحطة الرئيسية
    const peer = new Peer('warrior-live', {
        config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]}
    });

    let hS = 0, aS = 0, clockSecs = 0, clockInterval;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(s => {
        document.getElementById('main-v').srcObject = s;
        document.getElementById('c1').srcObject = s;
    });

    // عندما يتصل المصور بالمخرج
    peer.on('call', call => {
        call.answer(); // لا نرسل كاميرا المخرج للمصور، فقط نستقبل
        call.on('stream', s => {
            document.getElementById('c2').srcObject = s;
        });
    });

    // إرسال البث للمشجعين عند طلبهم (تلقائي)
    peer.on('connection', conn => {
        conn.on('data', data => {
            if(data === 'request_stream') {
                const stream = document.getElementById('main-v').srcObject;
                peer.call(conn.peer, stream);
            }
        });
    });

    // الربط بالمصور يدوياً إذا لزم الأمر
    function connectToStaff() {
        const id = document.getElementById('staff-cam-id').value;
        const call = peer.call(id, document.getElementById('c1').srcObject);
        call.on('stream', s => { document.getElementById('c2').srcObject = s; });
    }

    function switchMainView(type) {
        const main = document.getElementById('main-v');
        main.srcObject = (type === 'staff') ? document.getElementById('c2').srcObject : document.getElementById('c1').srcObject;
    }

    function showTab(id, btn) {
        document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function startClock() { if(!clockInterval) clockInterval = setInterval(() => { clockSecs++; updateClockUI(); }, 1000); }
    function stopClock() { clearInterval(clockInterval); clockInterval = null; }
    function updateClockUI() {
        let m = Math.floor(clockSecs / 60).toString().padStart(2, '0');
        let s = (clockSecs % 60).toString().padStart(2, '0');
        document.getElementById('timer-display').innerText = `${m}:${s}`;
    }
    function applyExtra() {
        let ex = document.getElementById('extra-in').value;
        document.getElementById('extra-display').innerText = ex ? `+${ex}` : "";
    }
    function scoreGoal(team) {
        if(team === 'h') hS++; else aS++;
        const label = document.getElementById('gol-text');
        label.style.display = "flex";
        setTimeout(() => { label.style.display = "none"; document.getElementById('sh').innerText = hS; document.getElementById('sa').innerText = aS; }, 4000);
        db.ref('live_score').set({hS, aS});
    }
    function doSub() {
        let p1 = document.getElementById('p-out').value;
        let p2 = document.getElementById('p-in').value;
        showOverlay(`تبديل: ⬆️ دخول ${p2} | ⬇️ خروج ${p1}`);
    }
    function doCard(type) {
        let name = document.getElementById('p-card').value;
        showOverlay(`${type}: ${name}`);
    }
    function showOverlay(msg) {
        const ov = document.getElementById('action-overlay');
        document.getElementById('action-text').innerText = msg;
        ov.style.display = "flex";
        setTimeout(() => { ov.style.display = "none"; }, 4500);
    }
    function loadOppLogo(input) { if (input.files && input.files[0]) { let r = new FileReader(); r.onload = e => document.getElementById('opp-logo-view').src = e.target.result; r.readAsDataURL(input.files[0]); } }
    function saveToDB(path, data) { if(Object.values(data).every(v => v !== "")) { db.ref(path).push(data); alert("تم الحفظ"); } }

    db.ref('staff').on('value', s => { let t = document.querySelector('#staff-table tbody'); t.innerHTML = ""; s.forEach(c => { t.innerHTML += `<tr><td>${c.val().name}</td><td>${c.val().job}</td><td>✅ متصل</td></tr>`; }); });
    db.ref('products').on('value', s => { let t = document.querySelector('#store-table tbody'); t.innerHTML = ""; s.forEach(c => { t.innerHTML += `<tr><td>${c.val().name}</td><td>${c.val().price} ج.س</td></tr>`; }); });
    db.ref('matches').on('value', s => { let t = document.querySelector('#matches-table tbody'); t.innerHTML = ""; s.forEach(c => { t.innerHTML += `<tr><td>${c.val().opp}</td><td>${c.val().date}</td></tr>`; }); });
</script>
</body>
</html>
