<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بث مباريات نادي المحارب - للمشجعين</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; text-align: center; }
        .live-header { background: #005B71; color: white; padding: 20px; border-bottom: 4px solid #D4AF37; }
        .score-board { 
            background: #222; color: #D4AF37; display: inline-flex; 
            align-items: center; gap: 20px; padding: 20px 40px; 
            border-radius: 15px; margin-top: -30px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .score-num { font-size: 3rem; font-weight: 900; }
        .video-frame { 
            width: 95%; max-width: 800px; margin: 30px auto; 
            aspect-ratio: 16/9; background: #000; border-radius: 15px; 
            overflow: hidden; border: 3px solid #333;
        }
        .live-tag { background: red; color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="live-header">
    <h1>🔴 بث مباشر - نادي المحارب</h1>
    <div class="live-tag">LIVE</div>
</div>

<div class="score-board">
    <div><img src="8397.jpg" width="50"><br>المحارب</div>
    <div class="score-num" id="s-h">0</div>
    <div style="font-size: 2rem;">-</div>
    <div class="score-num" id="s-a">0</div>
    <div><img id="opp-img" src="8397.jpg" width="50"><br>الخصم</div>
</div>

<div class="video-frame">
    <video id="fan-view" style="width:100%; height:100%; object-fit:cover;" autoplay playsinline controls></video>
</div>

<script>
    // نفس إعدادات Firebase الخاصة بك
    const firebaseConfig = {
        apiKey: "AIzaSyCCK45eRuoY6VqA5lrA7z89pZ3_mU",
        databaseURL: "https://warrior-club-2aac0-default-rtdb.firebaseio.com/",
        projectId: "warrior-club-2aac0"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // تحديث النتيجة للمشجعين فوراً عند تغييرها من قبلك
    db.ref('live_score').on('value', (snapshot) => {
        const data = snapshot.val();
        if(data) {
            document.getElementById('s-h').innerText = data.hS;
            document.getElementById('s-a').innerText = data.aS;
        }
    });

    // ملاحظة: لجعل المشاهد يرى الفيديو، يجب عليك في كود المخرج 
    // إرسال البث إلى "المشجعين" عبر PeerJS بنفس الطريقة التي استقبلت بها من المصور.
</script>
</body>
</html>
